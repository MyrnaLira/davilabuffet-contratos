    <title>Contrato Davila Buffet e Drinks </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-black: #1a1a1a;
            --accent-gold: #d4af37;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
            --alert-red: #d93025;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            -webkit-user-select: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #pagina-contrato {
            display: none;
            padding: 30px;
            color: black;
            line-height: 1.2;
        }

        .info-linha {
            margin: 0;
            padding: 2px 0;
            font-size: 16px;
        }

        .alert-text {
            color: var(--alert-red);
            font-weight: bold;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: var(--primary-black);
            margin-top: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent-gold);
            padding-bottom: 5px;
        }

        h2 {
            font-size: 16px;
            background-color: var(--primary-black);
            color: var(--accent-gold);
            padding: 8px;
            border-radius: 5px;
            margin-top: 25px;
            border-left: 4px solid var(--accent-gold);
        }

        .field-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
            font-family: inherit;
        }

        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, input[type="time"]:focus, input[type="email"]:focus {
            border-color: var(--accent-gold);
            outline: none;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .check-item input {
            margin-right: 8px;
            transform: scale(1.1);
        }

        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        #secao-promocional, #secao-frutas-drinks {
            display: none;
            background: #fff9f0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            margin-top: 15px;
        }

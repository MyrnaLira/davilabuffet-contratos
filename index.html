<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .logo-container img { max-width: 140px; height: auto; }

        h1 { font-size: 18px; text-align: center; color: var(--primary-gold); text-transform: uppercase; margin: 10px 0; }
        h2 { font-size: 15px; background: var(--primary-gold); color: white; padding: 10px; border-radius: 5px; margin-top: 20px; }

        .field-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }

        /* Estilo dos Inputs para aparecerem bem no PDF */
        input[type="text"], input[type="date"], input[type="number"], input[type="time"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fff;
        }

        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .check-item { display: flex; align-items: center; background: #f9f9f9; padding: 8px; border-radius: 5px; border: 1px solid #eee; font-size: 13px; }
        .check-item input { margin-right: 8px; transform: scale(1.2); }

        .pix-box { background: #e8f5e9; border: 1px dashed #2e7d32; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 14px; }

        .signature-area { margin-top: 25px; text-align: center; }
        canvas#signature-pad { border: 2px solid #aaa; background: #fff; width: 100%; height: 180px; border-radius: 8px; touch-action: none; }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .action-btn { padding: 15px 5px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }
        .btn-clear { background: #666; color: white; border: none; padding: 8px; margin-top: 10px; border-radius: 5px; cursor: pointer; }

        @media print {
            .no-print, .action-buttons, .btn-clear { display: none !important; }
            .container { box-shadow: none; border: none; padding: 0; margin: 0; width: 100%; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Logo">
    </div>

    <h1>Contrato de Prestação de Serviços</h1>

    <h2>DADOS DO CONTRATANTE E EVENTO</h2>
    <div class="checkbox-group">
        <label class="check-item"><input type="radio" name="pacote"> Pacote Infantil</label>
        <label class="check-item"><input type="radio" name="pacote"> Pacote Adulto</label>
        <label class="check-item"><input type="radio" name="pacote"> Pacote Casamento</label>
        <label class="check-item"><input type="radio" name="pacote"> Promocional</label>
    </div>

    <div class="field-group">
        <label>Nome do Contratante:</label>
        <input type="text" id="cli-nome" placeholder="Nome completo">
    </div>

    <div class="field-group">
        <label>Endereço do Evento:</label>
        <input type="text">
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 12px;">
        <div style="flex: 1;"><label>Data:</label><input type="date"></div>
        <div style="flex: 1;"><label>Hora:</label><input type="time"></div>
        <div style="flex: 1;"><label>Convidados:</label><input type="number"></div>
    </div>

    <h2>ITENS DO BUFFET</h2>
    <label>Caldinhos:</label>
    <div class="checkbox-group">
        <label class="check-item"><input type="checkbox"> Feijão</label>
        <label class="check-item"><input type="checkbox"> Camarão</label>
        <label class="check-item"><input type="checkbox"> Peixe</label>
        <label class="check-item"><input type="checkbox"> Kenga</label>
    </div>

    <div class="field-group">
        <label>Prato Principal:</label>
        <input type="text" placeholder="Ex: Estrogonofe de Carne">
    </div>

    <h2>PAGAMENTO</h2>
    <div class="field-group">
        <label>Valor Total: R$</label><input type="text" placeholder="0,00">
        <label>Restante: R$</label><input type="text" placeholder="0,00">
    </div>

    <div class="pix-box">
        <strong>Chave PIX: 81994539257</strong><br>
        Valquíria Gomes da Silva | PicPay
    </div>

    <div class="signature-area">
        <label>Assinatura do Cliente:</label><br>
        <canvas id="signature-pad"></canvas><br>
        <button class="btn-clear no-print" onclick="clearSignature()">Limpar Assinatura</button>
    </div>

    <div class="action-buttons no-print">
        <button class="action-btn btn-save" onclick="generatePDF()">💾 Baixar PDF</button>
        <button class="action-btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        <button class="action-btn btn-send" onclick="generatePDF()">📲 Enviar</button>
    </div>
</div>

<script>
    // Configuração do Canvas para Assinatura
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#000";
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { writing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); }
    function move(e) { if(!writing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); }
    function stop() { writing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);
    window.onload = resizeCanvas;

    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // GERAÇÃO DO PDF CORRIGIDA
    function generatePDF() {
        const element = document.getElementById('contract-content');
        const nome = document.getElementById('cli-nome').value || 'Contrato';

        // Opções para evitar página branca e capturar campos preenchidos
        const opt = {
            margin: [0, 0, 0, 0], // Remove margens extras
            filename: `${nome}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                letterRendering: true,
                scrollY: -window.scrollY // Corrige deslocamento no celular
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all' } // Impede que o PDF pule para a página 2 do nada
        };

        // Gerar o PDF
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>

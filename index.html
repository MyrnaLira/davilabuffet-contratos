<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            -webkit-user-select: none;
            font-size: 15px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            font-size: 17px;
            text-align: center;
            color: var(--primary-gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 14px;
            background-color: var(--primary-gold);
            color: white;
            padding: 6px;
            border-radius: 5px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .section-text {
            font-size: 13px;
            line-height: 1.5;
            margin: 10px 0;
            text-align: justify;
        }

        .field-group { margin-bottom: 12px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"], input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fafafa;
            font-family: inherit;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
            font-size: 13px;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .obs-box {
            background-color: #fdfdfd;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 13px;
        }

        .critical-alert {
            color: #b71c1c;
            font-weight: bold;
            text-decoration: underline;
        }

        .pix-box {
            background-color: #d4edda;
            border: 1px dashed #28a745;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
        }

        .signature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
        }

        canvas#signature-pad {
            border: 1px solid #ccc;
            background-color: #fff;
            width: 100%;
            height: 100px;
            border-radius: 5px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }

        button.action-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }

        @media print {
            .action-buttons, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Celebrar Buffet Logo">
    </div>

    <h1>CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE BUFFET</h1>

    <h2>DADOS DO CONTRATANTE E DO EVENTO</h2>
    
    <div class="field-group">
        <label>Nome do Contratante:</label>
        <input type="text" value="Márcia Gadilno da Silva">
    </div>

    <div class="field-group">
        <label>Endereço do Evento:</label>
        <input type="text" value="Rua A pontezinha">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <div class="field-group">
            <label>Data:</label>
            <input type="date" value="2026-04-05">
        </div>
        <div class="field-group">
            <label>Horário:</label>
            <input type="text" value="15:00 as 18:00">
        </div>
        <div class="field-group">
            <label>Convidados:</label>
            <input type="number" value="50">
        </div>
    </div>

    <div class="field-group">
        <label>E-mail:</label>
        <input type="email" value="Pauloouberpop@gmail.com">

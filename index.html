<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            -webkit-user-select: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: var(--primary-gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 16px;
            background-color: var(--primary-gold);
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 25px;
        }

        .field-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
            font-family: inherit;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* Ajuste específico para reduzir espaço na escolha do caldinho */
        .caldinho-grid {
            gap: 6px !important;
            margin-top: 5px !important;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 8px; /* Reduzido de 10px */
            border-radius: 6px;
            border: 1px solid #eee;
            cursor: pointer;
            font-size: 13px; /* Levemente menor para economizar espaço */
        }

        .check-item input {
            margin-right: 8px;
            transform: scale(1.1);
        }

        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        #secao-promocional {
            display: none;
            background: #fff9f0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            margin-top: 15px;
        }

        .warning-box {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 5px;
        }

        .pix-box {
            background-color: #d4edda;
            border: 1px dashed #28a745;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
        }

        .signature-area { margin-top: 30px; text-align: center; }

        canvas#signature-pad {
            border: 2px solid #ccc;
            background-color: #fff;
            width: 100%;
            height: 150px;
            border-radius: 5px;
            touch-action: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        button.action-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
        }

        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }

        @media print {
            .action-buttons, .btn-clear, .warning-box, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; padding: 0; }
        }
        
        @media (max-width: 480px) {
            .action-buttons { grid-template-columns: 1fr; }
            .checkbox-group { grid-template-columns: 1fr; }
            .caldinho-grid { grid-template-columns: 1fr 1fr !important; } /* Mantém duas colunas no mobile para caldinho */
            .inline-group { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Celebrar Buffet Logo">
    </div>

    <h1>FORMULÁRIO PARA CONTRATO DE BUFFET</h1>

    <h2>DADOS DO EVENTO</h2>
    
    <div class="checkbox-group">
        <label class="check-item"><input type="radio" name="pacote_tipo" onclick="verificarPromocional(false)"> Pacote Infantil</label>
        <label class="check-item"><input type="radio" name="pacote_tipo" onclick="verificarPromocional(false)"> Pacote Adulto</label>
        <label class="check-item"><input type="radio" name="pacote_tipo" onclick="verificarPromocional(false)"> Pacote Casamento</label>
        <label class="check-item"><input type="radio" name="pacote_tipo" id="radio-promocional" onclick="verificarPromocional(true)"> Pacote Promocional</label>
    </div>

    <div id="secao-promocional">
        <label>Utiliza promoção?</label>
        <div class="checkbox-group" style="grid-template-columns: 1fr 1fr; margin-bottom: 10px;">
            <label class="check-item"><input type="radio" name="usa_promo_geral"> Sim</label>
            <label class="check-item"><input type="radio" name="usa_promo_geral"> Não</label>
        </div>
        <label>Qual o nome da promoção?</label>
        <input type="text" placeholder="Ex: Promoção de Verão" id="nome-pacote-promo">
    </div>

    <div class="field-group" style="margin-top: 15px;">
        <label> Nome do Contratante:</label>
        <input type="text" placeholder="Nome completo">
    </div>
    
    <div class="field-group">
        <label> Endereço do Evento:</label>
        <input type="text" placeholder="Endereço">
    </div>

    <div class="inline-group">
        <div><label> Data:</label><input type="date"></div>
        <div><label> Horário:</label><input type="time"></div>
        <div><label> Convidados:</label><input type="number" placeholder="Ex: 100"></div>
    </div>

    <h2>INFORMAÇÕES DO BUFFET</h2>
    
    <label style="margin-bottom: 2px;">Escolha o sabor do caldinho:</label>
    <div class="checkbox-group caldinho-grid">
        <label class="check-item"><input type="checkbox"> Feijão</label>
        <label class="check-item"><input type="checkbox"> Feijoada</label>
        <label class="check-item"><input type="checkbox"> Camarão</label>
        <label class="check-item"><input type="checkbox"> Costela</label>
        <label class="check-item"><input type="checkbox"> Macaxeira</label>
        <label class="check-item"><input type="checkbox"> Kenga</label>
        <label class="check-item"><input type="checkbox"> Caldo Verde</label>
        <label class="check-item"><input type="checkbox"> Peixe</label>
    </div>

    <div class="field-group" style="margin-top: 15px;">
        <label>Prato Principal:</label>
        <input type="text" placeholder="Descreva o prato principal">
    </div>

    <label>Salgados:</label>
    <div class="checkbox-group" style="margin-top: 5px;">
        <label class="check-item"><input type="radio" name="salgados_opt"> Sim</label>
        <label class="check-item"><input type="radio" name="salgados_opt"> Não</label>
    </div>

    <div class="pix-box">
        <strong>Dados para Pagamento (Pix):</strong><br>
        Chave Pix: 81994539257<br>
        Favorecida: Valquíria Gomes da Silva<br>
        <small>* A reserva da data só é confirmada mediante pagamento do sinal.</small>
    </div>

    <div class="signature-area">
        <label>Assinatura do Cliente:</label>
        <canvas id="signature-pad"></canvas>
        <button class="no-print" onclick="clearSignature()" style="margin-top:10px; padding:8px; cursor:pointer; font-family: inherit;">Limpar Assinatura</button>
    </div>

    <div class="action-buttons">
        <button class="action-btn btn-save" onclick="saveData()">💾 Salvar</button>
        <button class="action-btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        <button class="action-btn btn-send" onclick="sendViaWhatsApp()">📲 Enviar PDF</button>
    </div>

</div>

<script>
    function verificarPromocional(isPromo) {
        const secao = document.getElementById('secao-promocional');
        secao.style.display = isPromo ? 'block' : 'none';
    }

    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        ctx.scale(ratio, ratio);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { writing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); }
    function move(e) { if (!writing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); }
    function stop() { writing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);

    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function sendViaWhatsApp() {
        const element = document.getElementById('contract-content');
        const opt = {
            margin: [0.3, 0.3], 
            filename: 'contrato_celebrar.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function saveData() { alert("Dados processados!"); }
</script>

</body>
</html>

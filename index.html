<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 130px;
            height: auto;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: var(--primary-gold);
            margin-top: 5px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 15px;
            background-color: var(--primary-gold);
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .field-group { margin-bottom: 12px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"] {
            width: 100%;
            padding: 12px; /* Aumentado para facilitar toque no mobile */
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; /* Evita zoom automático no iOS */
            background-color: #fafafa;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
            font-size: 13px;
            cursor: pointer;
        }

        .check-item input { margin-right: 8px; transform: scale(1.2); }

        /* Estilo para o grupo oculto */
        #promo-details {
            display: none; /* Escondido por padrão */
            background: #fff9f0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            margin-top: 10px;
        }

        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Três colunas no desktop */
            gap: 10px;
            margin-top: 8px;
        }

        .pix-box {
            background-color: #d4edda;
            border: 1px dashed #28a745;
            padding: 12px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 13px;
        }

        .signature-area {
            margin-top: 20px;
            text-align: center;
        }

        canvas#signature-pad {
            border: 2px solid #ccc;
            background-color: #fff;
            width: 100%;
            height: 180px;
            border-radius: 5px;
            touch-action: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr; /* Uma coluna no mobile */
            gap: 10px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }

        /* Ajustes específicos para Mobile */
        @media screen and (max-width: 480px) {
            .checkbox-group { grid-template-columns: 1fr; } /* Coluna única no mobile */
            .inline-group { grid-template-columns: 1fr; } /* Inputs empilhados no mobile */
            .action-buttons { grid-template-columns: 1fr; }
            h1 { font-size: 16px; }
        }

        @media print {
            .action-buttons, .btn-clear, .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Celebrar Buffet Logo">
    </div>

    <h1>Contrato de Prestação de Serviços de Buffet</h1>

    <h2>DADOS DO CONTRATANTE E DO EVENTO</h2>
    <div class="checkbox-group">
        <label class="check-item"><input type="radio" name="tipo-pacote" value="infantil" onclick="togglePromo(false)"> Pacote Infantil</label>
        <label class="check-item"><input type="radio" name="tipo-pacote" value="adulto" onclick="togglePromo(false)"> Pacote Adulto</label>
        <label class="check-item"><input type="radio" name="tipo-pacote" value="casamento" onclick="togglePromo(false)"> Pacote Casamento</label>
        <label class="check-item"><input type="radio" name="tipo-pacote" value="promocional" onclick="togglePromo(true)"> Pacote Promocional</label>
    </div>

    <div id="promo-details">
        <label>Este evento utiliza promoção?</label>
        <div class="checkbox-group" style="grid-template-columns: 1fr 1fr; margin-bottom: 10px;">
            <label class="check-item"><input type="radio" name="usa-promo"> Sim</label>
            <label class="check-item"><input type="radio" name="usa-promo"> Não</label>
        </div>
        <div class="field-group">
            <label>Qual o nome do pacote?</label>
            <input type="text" placeholder="Ex: Promoção de Verão" id="nome-promo">
        </div>
    </div>

    <div class="field-group" style="margin-top: 15px;">
        <label>Nome do Contratante:</label>
        <input type="text" id="cli-nome" placeholder="Nome Completo">
    </div>

    <div class="field-group">
        <label>Endereço do Evento:</label>
        <input type="text" placeholder="Rua, Número, Bairro">
    </div>

    <div class="inline-group">
        <div><label>Data:</label><input type="date"></div>
        <div><label>Horário:</label><input type="time"></div>
        <div><label>Convidados:</label><input type="number"></div>
    </div>

    <h2>INFORMAÇÕES DO BUFFET</h2>
    <label>Sabores do Caldinho:</label>
    <div class="checkbox-group">
        <label class="check-item"><input type="checkbox"> Feijão</label>
        <label class="check-item"><input type="checkbox"> Feijoada</label>
        <label class="check-item"><input type="checkbox"> Camarão</label>
        <label class="check-item"><input type="checkbox"> Costela</label>
        <label class="check-item"><input type="checkbox"> Macaxeira</label>
        <label class="check-item"><input type="checkbox"> Kenga</label>
        <label class="check-item"><input type="checkbox"> Caldo Verde</label>
        <label class="check-item"><input type="checkbox"> Peixe</label>
    </div>

    <div class="field-group">
        <label>Prato Principal:</label>
        <input type="text" placeholder="Ex: Estrogonofe de Frango">
    </div>

    <div class="field-group">
        <label>Salgados inclusos?</label>
        <div class="checkbox-group" style="grid-template-columns: 1fr 1fr;">
            <label class="check-item"><input type="radio" name="salg"> Sim</label>
            <label class="check-item"><input type="radio" name="salg"> Não</label>
        </div>
    </div>

    <h2>VALORES E PAGAMENTO</h2>
    <div class="inline-group">
        <div><label>Valor Total: R$</label><input type="text" placeholder="0,00"></div>
        <div><label>Entrada: R$</label><input type="text" placeholder="0,00"></div>
        <div><label>Restante: R$</label><input type="text" placeholder="0,00"></div>
    </div>

    <div class="pix-box">
        <strong>PIX: 81994539257</strong><br>
        Valquíria Gomes da Silva | PicPay<br><br>
        📌 Envie o comprovante após preencher.
    </div>

    <div class="signature-area">
        <label>Assinatura do Cliente:</label><br>
        <canvas id="signature-pad"></canvas><br>
        <button class="btn-clear no-print" onclick="clearSignature()" style="background:#666; color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;">Limpar Assinatura</button>
    </div>

    <div class="action-buttons no-print">
        <button class="action-btn btn-save" onclick="generatePDF()">💾 Salvar Contrato</button>
        <button class="action-btn btn-send" onclick="generatePDF()">📲 Enviar WhatsApp</button>
        <button class="action-btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
    </div>
</div>

<script>
    // Lógica para mostrar/esconder campo promocional
    function togglePromo(show) {
        const promoDiv = document.getElementById('promo-details');
        promoDiv.style.display = show ? 'block' : 'none';
    }

    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;

    function setupCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.offsetWidth;
        canvas.height = 180;
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { writing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
    function move(e) { if(!writing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function stop() { writing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);

    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    
    window.onload = setupCanvas;
    window.onresize = setupCanvas;

    function generatePDF() {
        const element = document.getElementById('contract-content');
        const nomeCli = document.getElementById('cli-nome').value || 'Cliente';
        
        // Garante que o texto digitado apareça no PDF
        const inputs = element.querySelectorAll('input');
        inputs.forEach(input => {
            if(input.type === 'checkbox' || input.type === 'radio') {
                if(input.checked) input.setAttribute('checked', 'checked');
                else input.removeAttribute('checked');
            } else {
                input.setAttribute('value', input.value);
            }
        });

        const opt = {
            margin: [5, 5],
            filename: `Contrato_${nomeCli}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid-all' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Times New Roman', Times, serif; /* Fonte alterada aqui */
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            -webkit-user-select: none;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: var(--primary-gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 16px;
            background-color: var(--primary-gold);
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 25px;
        }

        .field-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
            font-family: inherit; /* Garante que os inputs também usem Times New Roman */
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
            cursor: pointer;
        }

        .check-item input {
            margin-right: 10px;
            transform: scale(1.3);
        }

        /* Ajuste Mobile para Data/Hora/Convidados */
        .inline-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        #secao-promocional {
            display: none; /* Escondido por padrão */
            background: #fff9f0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffeeba;
            margin-top: 15px;
        }

        .warning-box {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 5px;
        }

        .pix-box {
            background-color: #d4edda;
            border: 1px dashed #28a745;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
        }

        .signature-area { margin-top: 30px; text-align: center; }

        canvas#signature-pad {
            border: 2px solid #ccc;
            background-color: #fff;
            width: 100%;
            height: 150px;
            border-radius: 5px;
            touch-action: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        button.action-btn {
            padding: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-family: inherit;
        }

        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }

        @media print {
            .action-buttons, .btn-clear, .warning-box, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; padding: 0; }
        }
        
        /* Ajustes específicos para Celular */
        @media (max-width: 480px) {
            .action-buttons { grid-template-columns: 1fr; }
            .checkbox-group { grid-template-columns: 1fr; }
            .inline-group { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Celebrar Buffet Logo">
    </div>

    <h2>DADOS DO CONTRATANTE E DO EVENTO</h2>
    
    <div class="checkbox-group">
        <label class="check-item"><input type="radio" name="pacote_tipo" onclick="verificarPromocional(false)"> Pacote Infantil</label>
        <label class="check-item"><input type="radio" name="pacote_tipo" onclick

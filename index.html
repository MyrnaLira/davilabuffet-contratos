<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrato Celebrar Buffet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-gold: #c69c6d;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --card-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            font-size: 18px;
            text-align: center;
            color: var(--primary-gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 16px;
            background-color: var(--primary-gold);
            color: white;
            padding: 8px;
            border-radius: 5px;
            margin-top: 25px;
        }

        .field-group { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="number"], input[type="time"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #fafafa;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .check-item input { margin-right: 10px; transform: scale(1.3); }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .warning-box {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 10px;
        }

        .pix-box {
            background-color: #d4edda;
            border: 1px dashed #28a745;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-size: 14px;
        }

        /* Ajuste Fino da Assinatura */
        .signature-area {
            margin-top: 30px;
            text-align: center;
        }

        canvas#signature-pad {
            border: 2px solid #ccc;
            background-color: #fff;
            width: 100%;
            height: 180px;
            border-radius: 5px;
            touch-action: none;
        }

        .btn-clear {
            background-color: #666;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* Botões Estilizados */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .action-btn {
            padding: 12px 5px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-save { background-color: #28a745; }
        .btn-print { background-color: #34495e; }
        .btn-send { background-color: #17a2b8; }

        @media print {
            .action-buttons, .btn-clear, .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container" id="contract-content">
    
    <div class="logo-container">
        <img src="celebrar_buffet_logo.png" alt="Celebrar Buffet Logo">
    </div>

    <h1>Contrato de Prestação de Serviços de Buffet</h1>

    <h2>DADOS DO CONTRATANTE E DO EVENTO</h2>
    <div class="checkbox-group">
        <label class="check-item"><input type="radio" name="tipo-pacote"> Pacote Infantil</label>
        <label class="check-item"><input type="radio" name="tipo-pacote"> Pacote Adulto</label>
        <label class="check-item"><input type="radio" name="tipo-pacote"> Pacote Casamento</label>
        <label class="check-item"><input type="radio" name="tipo-pacote"> Pacote Promocional</label>
    </div>

    <div class="inline-group">
        <label class="check-item"><input type="radio" name="usa-promo"> Sim</label>
        <label class="check-item"><input type="radio" name="usa-promo"> Não</label>
        <input type="text" placeholder="Qual o nome do pacote?" id="nome-promo">
    </div>

    <div class="field-group">
        <label>Nome do Contratante:</label>
        <input type="text" id="cli-nome" placeholder="Nome Completo">
    </div>

    <div class="field-group">
        <label>Endereço do Evento:</label>
        <input type="text">
    </div>

    <div class="inline-group">
        <div><label>Data:</label><input type="date"></div>
        <div><label>Horário:</label><input type="time"></div>
        <div><label>Convidados:</label><input type="number"></div>
    </div>

    <h2>INFORMAÇÕES DO BUFFET</h2>
    <label>Sabores do Caldinho:</label>
    <div class="checkbox-group">
        <label class="check-item"><input type="checkbox"> Feijão</label>
        <label class="check-item"><input type="checkbox"> Feijoada</label>
        <label class="check-item"><input type="checkbox"> Camarão</label>
        <label class="check-item"><input type="checkbox"> Costela</label>
        <label class="check-item"><input type="checkbox"> Macaxeira</label>
        <label class="check-item"><input type="checkbox"> Kenga</label>
        <label class="check-item"><input type="checkbox"> Caldo Verde</label>
        <label class="check-item"><input type="checkbox"> Peixe</label>
    </div>

    <div class="field-group">
        <label>Prato Principal:</label>
        <input type="text">
    </div>

    <div class="inline-group">
        <label>Salgados:</label>
        <label class="check-item"><input type="radio" name="salg"> Sim</label>
        <label class="check-item"><input type="radio" name="salg"> Não</label>
    </div>

    <h2>VALORES E PAGAMENTO</h2>
    <div class="field-group">
        <label>Valor Total: R$</label><input type="text">
        <label>Entrada: R$</label><input type="text">
        <label>Restante: R$</label><input type="text">
    </div>

    <div class="pix-box">
        <strong>PIX: 81994539257</strong><br>
        Valquíria Gomes da Silva | PicPay<br><br>
        📌 Envie o comprovante após preencher.
    </div>

    <div class="signature-area">
        <label>Assinatura do Cliente:</label><br>
        <canvas id="signature-pad"></canvas><br>
        <button class="btn-clear no-print" onclick="clearSignature()">Limpar Assinatura</button>
    </div>

    <div class="action-buttons no-print">
        <button class="action-btn btn-save" onclick="generatePDF()">💾 Salvar</button>
        <button class="action-btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
        <button class="action-btn btn-send" onclick="generatePDF()">📲 Enviar</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;

    function setupCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { writing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
    function move(e) { if(!writing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function stop() { writing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start, {passive: false});
    canvas.addEventListener('touchmove', move, {passive: false});
    canvas.addEventListener('touchend', stop);

    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    window.onload = setupCanvas;

    function generatePDF() {
        const element = document.getElementById('contract-content');
        const nome = document.getElementById('cli-nome').value || 'Cliente';
        const opt = {
            margin: 5,
            filename: `Contrato_Buffet_${nome}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
        alert("PDF gerado com sucesso! Agora é só enviar no WhatsApp.");
    }
</script>

</body>
</html>
